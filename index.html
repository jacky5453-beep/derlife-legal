<!DOCTYPE html>

<title>得來素企業 - 法律文件</title>
<style>
  :root {
    --brand: #C3F000;
    --accent: #FFAA00;
    --dark: #1A1A16;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Noto Sans TC", sans-serif;
    line-height: 1.7;
    color: var(--dark);
    background: #fafaf7;
    padding: 40px 20px;
  }
  .wrap { max-width: 720px; margin: 0 auto; }
  header {
    text-align: center;
    padding: 60px 20px;
    background: var(--dark);
    color: #fff;
    border-radius: 16px;
    margin-bottom: 40px;
  }
  header h1 { font-size: 2rem; margin-bottom: 8px; }
  header p { color: var(--brand); font-size: 0.95rem; }
  .links {
    display: grid;
    gap: 16px;
    margin-bottom: 40px;
  }
  .links a {
    display: block;
    padding: 20px 24px;
    background: #fff;
    border: 2px solid #eee;
    border-radius: 12px;
    color: var(--dark);
    text-decoration: none;
    transition: all 0.15s;
  }
  .links a:hover {
    border-color: var(--brand);
    transform: translateY(-2px);
  }
  .links strong { display: block; font-size: 1.1rem; margin-bottom: 4px; }
  .links span { color: #666; font-size: 0.9rem; }
  footer {
    text-align: center;
    color: #888;
    font-size: 0.85rem;
    padding: 20px;
  }
</style>
</head>
